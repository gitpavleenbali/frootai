<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the canopy (green to teal) -->
    <linearGradient id="canopyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for fruit (indigo to violet) -->
    <linearGradient id="fruitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for trunk -->
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for roots -->
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.7" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (subtle) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.15"/>

  <!-- Roots (neural network pattern) -->
  <g opacity="0.9">
    <!-- Root branches spreading down -->
    <path d="M100,145 Q85,160 70,175" stroke="url(#rootGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M100,145 Q90,165 80,180" stroke="url(#rootGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M100,145 Q110,160 130,175" stroke="url(#rootGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M100,145 Q115,165 125,180" stroke="url(#rootGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M100,145 Q100,165 100,182" stroke="url(#rootGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Root nodes (neural network dots) -->
    <circle cx="70" cy="175" r="3" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="80" cy="180" r="2.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="130" cy="175" r="3" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="125" cy="180" r="2.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="100" cy="182" r="2.5" fill="#f59e0b" opacity="0.8"/>
    <!-- Root tendrils -->
    <path d="M70,175 Q60,180 55,185" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M130,175 Q140,180 145,185" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Trunk -->
  <rect x="95" y="105" width="10" height="42" rx="3" fill="url(#trunkGrad)"/>

  <!-- Canopy (layered circles for tree crown) -->
  <g filter="url(#glow)">
    <circle cx="100" cy="75" r="35" fill="url(#canopyGrad)" opacity="0.25"/>
    <circle cx="100" cy="78" r="28" fill="url(#canopyGrad)" opacity="0.35"/>
    <circle cx="85" cy="82" r="22" fill="url(#canopyGrad)" opacity="0.3"/>
    <circle cx="115" cy="82" r="22" fill="url(#canopyGrad)" opacity="0.3"/>
    <circle cx="100" cy="70" r="24" fill="url(#canopyGrad)" opacity="0.4"/>
    <circle cx="88" cy="75" r="18" fill="url(#canopyGrad)" opacity="0.35"/>
    <circle cx="112" cy="75" r="18" fill="url(#canopyGrad)" opacity="0.35"/>
  </g>

  <!-- Branches (subtle lines in canopy) -->
  <g stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M100,105 Q90,95 80,85"/>
    <path d="M100,105 Q110,95 120,85"/>
    <path d="M100,105 Q95,90 85,75"/>
    <path d="M100,105 Q105,90 115,75"/>
    <path d="M100,105 Q100,90 100,70"/>
  </g>

  <!-- Fruits (glowing orbs on the canopy) -->
  <circle cx="78" cy="68" r="6" fill="url(#fruitGrad)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="118" cy="72" r="5" fill="url(#fruitGrad)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="98" cy="55" r="5.5" fill="url(#fruitGrad)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="108" cy="62" r="4" fill="#7c3aed" filter="url(#glow)" opacity="0.7"/>
  <circle cx="85" cy="80" r="4.5" fill="url(#fruitGrad)" filter="url(#glow)" opacity="0.8"/>

  <!-- AI circuit pattern (connecting fruits like neural network) -->
  <g stroke="#818cf8" stroke-width="0.8" fill="none" opacity="0.4">
    <line x1="78" y1="68" x2="98" y2="55"/>
    <line x1="98" y1="55" x2="118" y2="72"/>
    <line x1="78" y1="68" x2="85" y2="80"/>
    <line x1="118" y1="72" x2="108" y2="62"/>
    <line x1="108" y1="62" x2="98" y2="55"/>
  </g>

  <!-- Data flow particles (tiny dots along connections) -->
  <circle cx="88" cy="61" r="1.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="108" cy="63" r="1.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="82" cy="74" r="1.5" fill="#818cf8" opacity="0.6"/>

  <!-- Ground line (subtle) -->
  <line x1="50" y1="147" x2="150" y2="147" stroke="#6366f1" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- AIFROOT text -->
  <text x="100" y="198" text-anchor="middle" fill="#818cf8" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">
    FROOTAI
  </text>
</svg>
