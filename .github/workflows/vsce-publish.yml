name: Publish VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'vscode-extension/**'
    tags:
      - 'ext-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check if version is newer than marketplace
        id: version_check
        working-directory: vscode-extension
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          MARKETPLACE=$(npx @vscode/vsce show pavleenbali.frootai --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).versions[0].version" 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "marketplace=$MARKETPLACE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$MARKETPLACE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai extension v$LOCAL (marketplace has $MARKETPLACE)"
          fi

      - name: Package and Publish
        if: steps.version_check.outputs.skip != 'true'
        working-directory: vscode-extension
        run: |
          vsce package
          vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
